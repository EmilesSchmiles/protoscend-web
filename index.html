<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROTOSCEND — Your Turning Point In Software</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,100..900;1,100..900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="images/emblem.png" />
</head>
<body>

    <!-- Intro Splash Loader -->
    <div id="splash-screen">

        <!-- Background -->
        <div class="splash-background">
            <div class="bg-vignette"></div>
            <div class="bg-grain"></div>

            <!-- Corner Hex Groups -->
            <div class="hex-group hex-top-right">
                <div class="hex solid"></div>
                <div class="hex outline"></div>
                <div class="hex dark"></div>
            </div>

            <div class="hex-group hex-bottom-left">
                <div class="hex solid"></div>
                <div class="hex outline red"></div>
                <div class="hex dark"></div>
            </div>

            <!-- Tech Lines -->
            <div class="tech-line tl-top"></div>
            <div class="tech-line tl-bottom"></div>
        </div>

        <!-- Content -->
        <div class="splash-center">

            <div class="splash-logo-wrap">
                <img src="images/emblem.png" alt="Protoscend Logo" />
            </div>

            <div class="splash-text-block">

                <div class="splash-wordmark">
                    <span>P</span>
                    <span>R</span>
                    <span>O</span>
                    <span>T</span>
                    <span>O</span>
                    <span>S</span>
                    <span>C</span>
                    <span class="accent-e">E</span>
                    <span>N</span>
                    <span>D</span>
                </div>

                <div class="splash-tagline">
                    YOUR TURNING POINT IN SOFTWARE
                </div>

                <div class="splash-accent-line"></div>

            </div>

        </div>

    </div>

    <!-- Blazor App Root -->
    <div id="app" style="display:none;">
        <div id="blazor-error-ui">
            An unhandled error has occurred.
            <a href="" class="reload">Reload</a>
            <a class="dismiss">🗙</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
